<html>

    <head>
        <title>Contact Us</title>

        <link rel="stylesheet" href="ContactUs.css">
        
        <link rel="shortcut icon" type="image/jpg" href="images/images/fav-icon.png"/>

        <script src="ContactUs.js"></script>

    </head>

    <body>

        <div class="wrapper">

            <h2 align = 'center'>
                
                Contact Form
        
            </h2>

            <div id="error_message"></div>

            <form id="myform" action="save_contact.php" method="POST" onsubmit="return validate();">

                <div class="input_field"><input type="text" placeholder="Name" id="name" name="name"></div>

                <div class="input_field"><input type="text" placeholder="Subject" id="subject" name="subject"></div>

                <div class="input_field"><input type="text" placeholder="Phone" id="phone" name="phone"></div>

                <div class="input_field"><input type="text" placeholder="Email" id="email" name="email"></div>

                <div class="input_field"><textarea placeholder="Message" id="message" name="message"></textarea></div>

                <button type="submit" class="btn">Submit</button>
            </form>


        </div>

    </body>

</html>
