<html>
<head>
    <title>Payment Page</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>
    <div class="payment-container">
        <h2>Payment Details</h2>
        <form id="payment-form">
            <label for="card-name">Cardholder Name</label>
            <input type="text" id="card-name" name="card_holder" placeholder="Enter cardholder name" required>

            <label for="card-number">Card Number</label>
            <div style="position: relative;">
                <input type="text" id="card-number" name="card_number" placeholder="5484 4844 5591 5995" required style="padding-right: 40px;">
                <img id="card-icon" src="" alt="" style="position: absolute; right: 10px; top: 10px; height: 20px; display: none;">
            </div>

            <label for="expiry">Expiry Date</label>
            <input type="month" id="expiry" name="expiry_date" required>

            <label for="cvv">CVV</label>
            <input type="password" id="cvv" placeholder="123" name="cvv" required>

            <button type="submit" id="submit-btn">Proceed</button>
            <div id="spinner" style="display:none; margin-top:10px; text-align: center;">
                <div class="loader"></div>
                <div style="margin-top: 5px; color: #555;"></div>
            </div>

            <div id="payment_message" style="margin-top: 10px;"></div>
        </form>
    </div>

    <script src="payment.js"></script>
</body>
</html>
